<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>B Mobile – Spin the Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --red:   #E30613;
  --dark:  #0a0a0f;
  --gold:  #FFD700;
  --white: #ffffff;
}

html, body {
  width: 100%; height: 100%;
}

body {
  font-family: 'Exo 2', 'Segoe UI', Arial, sans-serif;
  background: var(--dark);
  /* EXACT CENTER — the only layout rule that matters */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  position: relative;
  padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px)
           env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
  overscroll-behavior: none;
}

/* ── Background layers ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(227,6,19,.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(227,6,19,.10) 0%, transparent 60%),
    linear-gradient(160deg, #0a0a0f 0%, #14141f 50%, #0d0d18 100%);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(227,6,19,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(227,6,19,.06) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove { to { background-position: 48px 48px; } }

.bg-orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
  animation: orbDrift 8s ease-in-out infinite alternate;
}
.orb1 { width:400px; height:400px; background:rgba(227,6,19,.12); top:-100px; left:-100px; }
.orb2 { width:300px; height:300px; background:rgba(227,6,19,.08); bottom:-80px; right:-80px; animation-delay:-4s; }
@keyframes orbDrift { to { transform: translate(30px,20px) scale(1.1); } }

/* ── Game wrapper — column, centred ── */
.game-wrap {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(10px, 2.5vh, 22px);
  padding: clamp(10px, 2vh, 20px);
  width: 100%;
}

/* ── Header ── */
.header { text-align: center; }
.header-brand {
  font-family: 'Orbitron', Arial, sans-serif;
  font-size: clamp(1.1rem, 4.5vw, 2rem);
  font-weight: 900; color: var(--white);
  letter-spacing: .12em; text-transform: uppercase; line-height: 1;
}
.header-brand span { color: var(--red); }
.header-sub {
  font-size: clamp(.6rem, 2.2vw, .82rem);
  color: rgba(255,255,255,.42);
  letter-spacing: .28em; text-transform: uppercase; margin-top: 5px;
}

/* ── Wheel scene — strictly square, centred ── */
.wheel-scene {
  position: relative;
  /* never larger than the smaller viewport dimension minus header space */
  width:  min(80vw, 62vh, 460px);
  height: min(80vw, 62vh, 460px);
  flex-shrink: 0;
}

/* Glow ring behind wheel */
.wheel-glow {
  position: absolute; inset: -10px; border-radius: 50%;
  background: conic-gradient(
    var(--red) 0deg,#ff4455 30deg,var(--red) 60deg,
    #cc0011 90deg,var(--red) 120deg,#ff4455 150deg,
    var(--red) 180deg,#cc0011 210deg,var(--red) 240deg,
    #ff4455 270deg,var(--red) 300deg,#cc0011 330deg,var(--red) 360deg
  );
  filter: blur(14px); opacity: .5;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.38;} 50%{opacity:.72;} }

/* Canvas wrapper */
.wheel-wrap {
  position: absolute; inset: 0; border-radius: 50%;
  box-shadow: 0 0 36px rgba(227,6,19,.28), 0 0 70px rgba(0,0,0,.55);
}
#wheelCanvas {
  display: block; width: 100%; height: 100%;
  border-radius: 50%; touch-action: none;
}

/* Pointer */
.pointer {
  position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0; z-index: 20;
  border-left: 13px solid transparent;
  border-right: 13px solid transparent;
  border-top: 28px solid var(--red);
  filter: drop-shadow(0 0 7px var(--red));
}
.pointer::after {
  content: ''; position: absolute; top: -28px; left: -8px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 10px var(--red), 0 0 22px var(--red);
}

/* Spinning border ring */
.spin-ring {
  position: absolute; inset: -5px; border-radius: 50%;
  border: 3px solid transparent;
  border-top-color: var(--red);
  border-right-color: rgba(227,6,19,.22);
  pointer-events: none; z-index: 25;
}
.spin-ring.active { animation: ringTurn .55s linear infinite; }
@keyframes ringTurn { to { transform: rotate(360deg); } }

/* Centre button */
.center-btn {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20%; height: 20%;
  min-width: 62px; min-height: 62px;
  max-width: 108px; max-height: 108px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.2);
  background: radial-gradient(circle, #1a1a2e 0%, #0d0d18 70%);
  box-shadow: 0 0 0 5px rgba(227,6,19,.2), 0 0 28px rgba(0,0,0,.8),
              inset 0 2px 4px rgba(255,255,255,.1);
  cursor: pointer; z-index: 30;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1px;
  transition: box-shadow .2s, transform .15s;
  -webkit-appearance: none; appearance: none;
  user-select: none; -webkit-user-select: none;
}
.center-btn:hover {
  box-shadow: 0 0 0 5px rgba(227,6,19,.5), 0 0 36px rgba(227,6,19,.4),
              inset 0 2px 4px rgba(255,255,255,.1);
  transform: translate(-50%,-50%) scale(1.07);
}
.center-btn:active  { transform: translate(-50%,-50%) scale(.96); }
.center-btn:disabled{ cursor: default; opacity: .8; }

.logo-b {
  font-family: 'Orbitron', Arial, sans-serif;
  font-size: clamp(16px,4vw,26px); font-weight: 900; color: var(--white);
  text-shadow: 0 0 10px rgba(227,6,19,.8); line-height: 1;
}
.logo-sub  { font-size: clamp(5px,1.2vw,7px); color: var(--red); letter-spacing:.18em; text-transform:uppercase; font-weight:700; }
.logo-hint { font-size: clamp(4px,1vw,6px); color: rgba(255,255,255,.36); letter-spacing:.08em; }

/* ── Result overlay ── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.72);
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .35s ease;
}
.overlay.show { opacity: 1; pointer-events: all; }

.result-card {
  background: linear-gradient(135deg,#14141f 0%,#1e1e2e 100%);
  border: 1px solid rgba(227,6,19,.4); border-radius: 20px;
  padding: clamp(22px,6vw,46px) clamp(26px,8vw,60px);
  text-align: center; position: relative;
  width: 100%; max-width: min(90vw, 420px);
  box-shadow: 0 0 60px rgba(227,6,19,.26), 0 24px 70px rgba(0,0,0,.65);
  transform: scale(.72);
  transition: transform .45s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .result-card { transform: scale(1); }

.result-card::before, .result-card::after {
  content:''; position:absolute; width:34px; height:34px;
  border-color:var(--red); border-style:solid;
}
.result-card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.result-card::after  { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

.res-emoji { font-size: clamp(2rem,9vw,3.6rem); display:block; margin-bottom:10px; line-height:1; }
.res-label { font-size:clamp(.58rem,2.2vw,.76rem); color:rgba(255,255,255,.46); letter-spacing:.3em; text-transform:uppercase; margin-bottom:8px; }
.res-prize {
  font-family:'Orbitron',Arial,sans-serif;
  font-size:clamp(1.1rem,5.5vw,2.3rem); font-weight:900; color:var(--white);
  margin-bottom:8px; word-break:break-word;
  animation: goldGlow 1.5s ease-in-out infinite alternate;
}
@keyframes goldGlow {
  from { text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(255,215,0,.2); }
  to   { text-shadow: 0 0 28px var(--gold), 0 0 56px rgba(255,215,0,.45); }
}
.res-sub { font-size:clamp(.62rem,2.2vw,.8rem); color:rgba(255,255,255,.36); margin-bottom:24px; line-height:1.5; }

.btn-again {
  background: var(--red); color: #fff; border: none; border-radius: 50px;
  padding: clamp(10px,3vw,13px) clamp(26px,7vw,38px);
  font-family:'Orbitron',Arial,sans-serif; font-weight:700;
  font-size:clamp(.68rem,2.4vw,.86rem); letter-spacing:.1em; text-transform:uppercase;
  cursor:pointer; width:100%; max-width:250px;
  box-shadow:0 4px 18px rgba(227,6,19,.5);
  transition:background .2s, transform .15s, box-shadow .2s;
  -webkit-appearance:none; appearance:none; touch-action:manipulation;
}
.btn-again:hover  { background:#ff1a2a; transform:translateY(-2px); box-shadow:0 8px 26px rgba(227,6,19,.65); }
.btn-again:active { transform:translateY(0); }

/* ── Confetti container ── */
#confettiBox {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}

/* Left-side pieces fall with slight rightward drift */
@keyframes fallLeft {
  0%   { transform: translateY(-30px) translateX(0)    rotate(0deg)   scale(1);   opacity: 1; }
  50%  { transform: translateY(48vh)  translateX(15px) rotate(360deg) scale(.85); opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateY(108vh) translateX(-8px) rotate(720deg) scale(.4);  opacity: 0; }
}

/* Right-side pieces fall with slight leftward drift */
@keyframes fallRight {
  0%   { transform: translateY(-30px) translateX(0)     rotate(0deg)    scale(1);   opacity: 1; }
  50%  { transform: translateY(48vh)  translateX(-15px) rotate(-360deg) scale(.85); opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateY(108vh) translateX(8px)   rotate(-720deg) scale(.4);  opacity: 0; }
}

/* Sparkle pop */
@keyframes sparkPop {
  0%   { transform: scale(0) rotate(0deg);    opacity: 1; }
  45%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
  100% { transform: scale(0) rotate(360deg);  opacity: 0; }
}

.cp { position:absolute; opacity:0; border-radius:2px; will-change:transform,opacity; }
.cp.L { animation: fallLeft  linear forwards; }
.cp.R { animation: fallRight linear forwards; }
.sp { position:absolute; opacity:0; pointer-events:none; line-height:1; animation: sparkPop ease-out forwards; }

/* Landscape phone */
@media (max-height:500px) and (orientation:landscape) {
  .game-wrap { flex-direction:row; gap:14px; }
  .wheel-scene { width:min(52vh,80vw,320px); height:min(52vh,80vw,320px); }
  .header-sub  { display:none; }
}

/* Reduced motion */
@media (prefers-reduced-motion:reduce) {
  .bg-grid,.bg-orb,.wheel-glow,.spin-ring.active { animation:none; }
  .cp,.sp { display:none; }
  .result-card,.overlay { transition:none; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<!-- confetti lives here, above everything -->
<div id="confettiBox"></div>

<div class="game-wrap">
  <div class="header">
    <div class="header-brand"><span>B</span> Mobile</div>
    <div class="header-sub">Spin &amp; Win Lucky Draw</div>
  </div>

  <div class="wheel-scene" id="wheelScene">
    <div class="wheel-glow"></div>
    <div class="pointer"></div>
    <div class="wheel-wrap">
      <canvas id="wheelCanvas"></canvas>
    </div>
    <div class="spin-ring" id="spinRing"></div>
    <button class="center-btn" id="spinBtn" aria-label="Spin the wheel">
      <span class="logo-b">B</span>
      <span class="logo-sub">Mobile</span>
      <span class="logo-hint">TAP TO SPIN</span>
    </button>
  </div>
</div>

<!-- Result card -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-live="assertive">
  <div class="result-card">
    <span class="res-emoji" id="resEmoji">🎉</span>
    <div class="res-label">You Won</div>
    <div class="res-prize" id="resPrize">Prize</div>
    <div class="res-sub"   id="resSub">Congratulations!</div>
    <button class="btn-again" id="btnAgain">Spin Again</button>
  </div>
</div>

<script>
'use strict';

/* ── Prize data ── */
var PRIZES = [
  { label:'Free Data 1GB',    emoji:'📶', sub:'Valid for 7 days. Check SMS for activation.',         color:'#E30613', text:'#fff' },
  { label:'RM5 Reload',       emoji:'💳', sub:'Credit added to your account within 24 hours.',        color:'#b8000e', text:'#fff' },
  { label:'Try Again',        emoji:'🔄', sub:'Better luck next spin!',                               color:'#2a2a3e', text:'#ccc' },
  { label:'Free Call 30min',  emoji:'📞', sub:'Valid today only. Calls within network.',              color:'#E30613', text:'#fff' },
  { label:'RM10 Voucher',     emoji:'🎫', sub:'Redeem at any B Mobile store.',                        color:'#900010', text:'#fff' },
  { label:'Try Again',        emoji:'🔄', sub:'Better luck next time!',                               color:'#2a2a3e', text:'#ccc' },
  { label:'Free SMS 100',     emoji:'💬', sub:'100 free SMS, valid for 3 days.',                      color:'#E30613', text:'#fff' },
  { label:'Grand Prize Draw', emoji:'🏆', sub:"You're entered into our monthly grand draw!",          color:'#FFD700', text:'#111' },
];

var N   = PRIZES.length;
var cvs = document.getElementById('wheelCanvas');
var ctx = cvs.getContext('2d');
var rot = 0;          // current rotation in radians
var spinning = false;
var resizeTimer = null;

/* ── Canvas size: match the CSS-laid-out scene ── */
function sizeCanvas() {
  var scene = document.getElementById('wheelScene');
  var sz = Math.round(scene.getBoundingClientRect().width);
  if (cvs.width === sz && cvs.height === sz) return;
  cvs.width = cvs.height = sz;
  draw(rot);
}
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(sizeCanvas, 80);
}, { passive:true });
window.addEventListener('orientationchange', function() { setTimeout(sizeCanvas, 220); });

/* ── Draw wheel ── */
function draw(rotation) {
  var W = cvs.width, H = cvs.height;
  if (!W) return;
  var cx = W/2, cy = H/2, R = W/2 - 4;
  var slice = (2*Math.PI) / N;

  ctx.clearRect(0, 0, W, H);

  /* outer ring */
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R+2,0,2*Math.PI);
  ctx.strokeStyle='rgba(227,6,19,.55)'; ctx.lineWidth=5; ctx.stroke();
  ctx.restore();

  for (var i = 0; i < N; i++) {
    var a0 = rotation + i*slice, a1 = a0+slice;
    var p  = PRIZES[i];

    /* slice */
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a0,a1); ctx.closePath();
    ctx.fillStyle = p.color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=1.5; ctx.stroke();

    /* inner accent arc */
    ctx.beginPath(); ctx.arc(cx,cy,R*.76,a0+.03,a1-.03);
    ctx.strokeStyle='rgba(255,255,255,.07)'; ctx.lineWidth=7; ctx.stroke();

    /* emoji + label — clipped to wedge, stacked radially */
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(a0+slice/2);

    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R-2,-slice/2,slice/2); ctx.closePath(); ctx.clip();

    var fs = Math.max(9,  W*.026);
    var es = Math.max(14, W*.044);
    var lh = fs*1.45;

    ctx.shadowColor='rgba(0,0,0,.75)'; ctx.shadowBlur=3;
    ctx.textAlign='center'; ctx.textBaseline='middle';

    var words = p.label.split(' ');
    var half  = Math.ceil(words.length/2);
    var lines = words.length>1
      ? [words.slice(0,half).join(' '), words.slice(half).join(' ')]
      : [words[0]];

    var gap    = fs*.55;
    var blockH = es+gap+lines.length*lh;
    var midR   = R*.58;
    var topY   = -(blockH/2);

    ctx.font = es+'px serif';
    ctx.fillText(p.emoji, midR, topY+es/2);

    ctx.font      = '700 '+fs+'px \'Exo 2\',Arial,sans-serif';
    ctx.fillStyle = p.text;
    var ty = topY+es+gap+lh/2;
    for (var l=0; l<lines.length; l++) ctx.fillText(lines[l], midR, ty+l*lh);

    ctx.restore();
  }

  /* centre shadow behind button */
  var g = ctx.createRadialGradient(cx,cy,0,cx,cy,R*.14);
  g.addColorStop(0,'rgba(0,0,0,.82)'); g.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,R*.18,0,2*Math.PI); ctx.fillStyle=g; ctx.fill();
}

/* ── Winner from final rotation ── */
function winner(rotation) {
  var slice = (2*Math.PI)/N;
  var a = ((-rotation - Math.PI/2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  return Math.floor(a/slice) % N;
}

/* ── Spin ── */
function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinRing').classList.add('active');

  var slice  = (2*Math.PI)/N;
  var target = Math.floor(Math.random()*N);
  var base   = -Math.PI/2 - target*slice - slice/2;
  var extra  = (12 + Math.floor(Math.random()*4)) * 2*Math.PI;
  var delta  = ((base - rot) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  if (delta < .15) delta += 2*Math.PI;
  var endRot = rot + delta + extra;
  var startR = rot;
  var t0     = null;
  var DUR    = 10000;

  function ease(t) { return 1-Math.pow(1-t,3); }

  function tick(ts) {
    if (!t0) t0 = ts;
    var el  = Math.min(ts-t0, DUR);
    var cur = startR + (endRot-startR)*ease(el/DUR);
    draw(cur);
    if (el < DUR) { requestAnimationFrame(tick); }
    else {
      rot = endRot;
      var w = winner(rot);
      spinning = false;
      document.getElementById('spinRing').classList.remove('active');
      showResult(w);
    }
  }
  requestAnimationFrame(tick);
}

/* ── Show result ── */
function showResult(idx) {
  var p = PRIZES[idx];
  document.getElementById('resEmoji').textContent = p.emoji;
  document.getElementById('resPrize').textContent = p.label;
  document.getElementById('resSub').textContent   = p.sub;
  setTimeout(function() {
    document.getElementById('overlay').classList.add('show');
    if (p.label !== 'Try Again') confetti();
  }, 320);
}

function closeResult() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('spinBtn').disabled = false;
}

/* ── Confetti — left & right streams ── */
function confetti() {
  if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;

  var box      = document.getElementById('confettiBox');
  box.innerHTML = '';

  var colors   = ['#E30613','#FFD700','#fff','#ff6b6b','#ffd166','#ff4444','#FFD700','#E30613'];
  var sparkles = ['🎊','✨','⭐','💫','🌟','🎉'];

  /* Define left zone and right zone explicitly */
  var zones = [
    { cls:'L', lo:2,  hi:15 },   /* LEFT  side */
    { cls:'R', lo:85, hi:98 },   /* RIGHT side */
  ];

  /* Process each zone in its own loop — no shared variables */
  /* --- LEFT zone --- */
  (function() {
    var lo=2, hi=15, cls='L';
    for (var i=0; i<65; i++) {
      var el = document.createElement('div');
      el.className = 'cp '+cls;
      var sz  = 7+Math.random()*11;
      var isC = Math.random()<.33;
      var isR = !isC && Math.random()<.5;
      el.style.left              = (lo+Math.random()*(hi-lo))+'%';
      el.style.top               = '0px';
      el.style.width             = (isR?sz*.45:sz)+'px';
      el.style.height            = sz+'px';
      el.style.background        = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius      = isC?'50%':'2px';
      el.style.animationDuration = (2.2+Math.random()*2.8)+'s';
      el.style.animationDelay    = (Math.random()*2.0)+'s';
      box.appendChild(el);
    }
    for (var j=0; j<14; j++) {
      var sp = document.createElement('div');
      sp.className   = 'sp';
      sp.textContent = sparkles[Math.floor(Math.random()*sparkles.length)];
      sp.style.left              = (lo+Math.random()*(hi-lo))+'%';
      sp.style.top               = (4+Math.random()*84)+'%';
      sp.style.fontSize          = (15+Math.random()*16)+'px';
      sp.style.animationDuration = (.5+Math.random()*.9)+'s';
      sp.style.animationDelay    = (Math.random()*2.0)+'s';
      box.appendChild(sp);
    }
  })();

  /* --- RIGHT zone --- */
  (function() {
    var lo=85, hi=98, cls='R';
    for (var i=0; i<65; i++) {
      var el = document.createElement('div');
      el.className = 'cp '+cls;
      var sz  = 7+Math.random()*11;
      var isC = Math.random()<.33;
      var isR = !isC && Math.random()<.5;
      el.style.left              = (lo+Math.random()*(hi-lo))+'%';
      el.style.top               = '0px';
      el.style.width             = (isR?sz*.45:sz)+'px';
      el.style.height            = sz+'px';
      el.style.background        = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius      = isC?'50%':'2px';
      el.style.animationDuration = (2.2+Math.random()*2.8)+'s';
      el.style.animationDelay    = (Math.random()*2.0)+'s';
      box.appendChild(el);
    }
    for (var j=0; j<14; j++) {
      var sp = document.createElement('div');
      sp.className   = 'sp';
      sp.textContent = sparkles[Math.floor(Math.random()*sparkles.length)];
      sp.style.left              = (lo+Math.random()*(hi-lo))+'%';
      sp.style.top               = (4+Math.random()*84)+'%';
      sp.style.fontSize          = (15+Math.random()*16)+'px';
      sp.style.animationDuration = (.5+Math.random()*.9)+'s';
      sp.style.animationDelay    = (Math.random()*2.0)+'s';
      box.appendChild(sp);
    }
  })();

  setTimeout(function() { box.innerHTML=''; }, 6500);
}

/* ── Events ── */
document.getElementById('spinBtn').addEventListener('click', spin);
document.getElementById('spinBtn').addEventListener('touchend', function(e){ e.preventDefault(); spin(); }, {passive:false});
document.getElementById('btnAgain').addEventListener('click', closeResult);
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeResult(); });

/* ── Init ── */
if (document.fonts && document.fonts.ready) { document.fonts.ready.then(sizeCanvas); }
else { sizeCanvas(); }
</script>
</body>
</html>
