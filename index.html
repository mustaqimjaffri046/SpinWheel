<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>B Mobile – Spin the Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --brand-red:   #E30613;
    --brand-dark:  #0a0a0f;
    --brand-mid:   #14141f;
    --brand-gold:  #FFD700;
    --brand-white: #ffffff;
    --brand-gray:  #1e1e2e;
    /* safe-area padding for notched phones */
    --sat: env(safe-area-inset-top,    0px);
    --sar: env(safe-area-inset-right,  0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left,   0px);
  }

  html {
    height: -webkit-fill-available; /* iOS Safari full height */
  }

  body {
    font-family: 'Exo 2', 'Segoe UI', Arial, sans-serif;
    background: var(--brand-dark);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    /* respect notch */
    padding-top:    var(--sat);
    padding-right:  var(--sar);
    padding-bottom: var(--sab);
    padding-left:   var(--sal);
    /* prevent pull-to-refresh bounce on iOS */
    overscroll-behavior: none;
  }

  /* ── Animated background ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(227,6,19,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(227,6,19,0.10) 0%, transparent 60%),
      linear-gradient(160deg, #0a0a0f 0%, #14141f 50%, #0d0d18 100%);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(227,6,19,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(227,6,19,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll { to { background-position: 48px 48px; } }

  .bg-orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    animation: orbFloat 8s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(227,6,19,0.12); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(227,6,19,0.08); bottom: -80px; right: -80px; animation-delay: -4s; }
  @keyframes orbFloat { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

  /* ── Game wrapper ── */
  .game-wrap {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(12px, 3vw, 24px);
    padding: clamp(12px, 3vw, 24px);
    width: 100%;
    max-width: 600px;
  }

  /* ── Header ── */
  .header { text-align: center; }
  .header-brand {
    font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
    font-size: clamp(1.2rem, 5vw, 2.2rem);
    font-weight: 900;
    color: var(--brand-white);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }
  .header-brand span { color: var(--brand-red); }
  .header-sub {
    font-size: clamp(0.6rem, 2.5vw, 0.85rem);
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* ── Wheel scene ──
     Size = min(85vw, 85vh - header - gap, 480px)
     We compute this entirely in CSS so it stays square on every viewport. */
  .wheel-scene {
    position: relative;
    /* never wider than viewport, never taller than remaining screen */
    width:  min(85vw, 60vh, 480px);
    height: min(85vw, 60vh, 480px);
    flex-shrink: 0;
  }

  /* Outer glow ring */
  .wheel-glow {
    position: absolute; inset: -10px;
    border-radius: 50%;
    background: conic-gradient(
      var(--brand-red) 0deg,  #ff4455 30deg,  var(--brand-red) 60deg,
      #cc0011 90deg,  var(--brand-red) 120deg, #ff4455 150deg,
      var(--brand-red) 180deg,#cc0011 210deg,  var(--brand-red) 240deg,
      #ff4455 270deg, var(--brand-red) 300deg, #cc0011 330deg, var(--brand-red) 360deg
    );
    filter: blur(14px);
    opacity: 0.5;
    animation: ringPulse 2s ease-in-out infinite;
  }
  @keyframes ringPulse { 0%,100%{opacity:0.4;} 50%{opacity:0.75;} }

  /* Canvas wrapper */
  .wheel-svg-wrap {
    position: absolute; inset: 0;
    border-radius: 50%;
    box-shadow: 0 0 36px rgba(227,6,19,0.3), 0 0 70px rgba(0,0,0,0.55);
  }
  #wheelCanvas {
    display: block;
    width: 100%; height: 100%;
    border-radius: 50%;
    /* no CSS transform — rotation is pure canvas */
    touch-action: none; /* prevent scroll interference on touch */
  }

  /* Pointer arrow */
  .pointer {
    position: absolute;
    top: -16px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left:  14px solid transparent;
    border-right: 14px solid transparent;
    border-top:   30px solid var(--brand-red);
    filter: drop-shadow(0 0 7px var(--brand-red));
    z-index: 20;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -30px; left: -9px;
    width: 18px; height: 18px;
    background: var(--brand-red);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--brand-red), 0 0 22px var(--brand-red);
  }

  /* Center spin button */
  .center-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    /* size relative to wheel */
    width:  20%;
    height: 20%;
    min-width:  64px;
    min-height: 64px;
    max-width:  110px;
    max-height: 110px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.2);
    background: radial-gradient(circle, #1a1a2e 0%, #0d0d18 70%);
    box-shadow:
      0 0 0 5px rgba(227,6,19,0.2),
      0 0 28px rgba(0,0,0,0.8),
      inset 0 2px 4px rgba(255,255,255,0.1);
    cursor: pointer;
    z-index: 30;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 1px;
    /* smooth press on touch */
    transition: box-shadow 0.2s, transform 0.15s;
    -webkit-appearance: none;
    appearance: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .center-btn:hover {
    box-shadow:
      0 0 0 5px rgba(227,6,19,0.5),
      0 0 36px rgba(227,6,19,0.4),
      inset 0 2px 4px rgba(255,255,255,0.1);
    transform: translate(-50%, -50%) scale(1.07);
  }
  .center-btn:active { transform: translate(-50%, -50%) scale(0.96); }
  .center-btn:disabled { cursor: default; opacity: 0.8; }

  .logo-b {
    font-family: 'Orbitron', Arial, sans-serif;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: var(--brand-white);
    line-height: 1;
    text-shadow: 0 0 10px rgba(227,6,19,0.8);
  }
  .logo-mobile {
    font-size: clamp(5px, 1.2vw, 8px);
    color: var(--brand-red);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    font-family: 'Exo 2', Arial, sans-serif;
  }
  .spin-hint {
    font-size: clamp(4px, 1vw, 6px);
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.08em;
    font-family: 'Exo 2', Arial, sans-serif;
  }

  /* Spinning border ring */
  .spinning-ring {
    position: absolute; inset: -5px;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: var(--brand-red);
    border-right-color: rgba(227,6,19,0.25);
    pointer-events: none; z-index: 25;
  }
  .spinning-ring.active { animation: ringRotate 0.55s linear infinite; }
  @keyframes ringRotate { to { transform: rotate(360deg); } }

  /* ── Result overlay ── */
  .result-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    /* fallback for browsers that don't support backdrop-filter */
    background: rgba(0,0,0,0.72);
    /* progressive enhancement */
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .result-overlay.show { opacity: 1; pointer-events: all; }

  .result-card {
    background: linear-gradient(135deg, #14141f 0%, #1e1e2e 100%);
    border: 1px solid rgba(227,6,19,0.4);
    border-radius: 20px;
    padding: clamp(24px, 6vw, 48px) clamp(28px, 8vw, 64px);
    text-align: center;
    position: relative;
    width: 100%;
    max-width: min(90vw, 440px);
    box-shadow: 0 0 60px rgba(227,6,19,0.28), 0 24px 70px rgba(0,0,0,0.65);
    transform: scale(0.72);
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-overlay.show .result-card { transform: scale(1); }

  /* Corner accents */
  .result-card::before, .result-card::after {
    content: ''; position: absolute;
    width: 36px; height: 36px;
    border-color: var(--brand-red); border-style: solid;
  }
  .result-card::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .result-card::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .result-emoji { font-size: clamp(2.2rem, 10vw, 3.8rem); display: block; margin-bottom: 10px; line-height: 1; }
  .result-label {
    font-size: clamp(0.6rem, 2.5vw, 0.78rem);
    color: rgba(255,255,255,0.48);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'Exo 2', Arial, sans-serif;
  }
  .result-prize {
    font-family: 'Orbitron', Arial, sans-serif;
    font-size: clamp(1.2rem, 6vw, 2.4rem);
    font-weight: 900;
    color: var(--brand-white);
    margin-bottom: 8px;
    /* animation keeps running even on older Safari */
    animation: prizeGlow 1.5s ease-in-out infinite alternate;
    word-break: break-word;
  }
  @keyframes prizeGlow {
    from { text-shadow: 0 0 10px var(--brand-gold), 0 0 20px rgba(255,215,0,0.2); }
    to   { text-shadow: 0 0 28px var(--brand-gold), 0 0 56px rgba(255,215,0,0.45); }
  }
  .result-sub {
    font-size: clamp(0.65rem, 2.5vw, 0.82rem);
    color: rgba(255,255,255,0.38);
    margin-bottom: 26px;
    font-family: 'Exo 2', Arial, sans-serif;
    line-height: 1.5;
  }

  .btn-again {
    background: var(--brand-red);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: clamp(11px,3vw,14px) clamp(28px,7vw,40px);
    font-family: 'Orbitron', Arial, sans-serif;
    font-weight: 700;
    font-size: clamp(0.7rem, 2.5vw, 0.88rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(227,6,19,0.5);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    max-width: 260px;
    touch-action: manipulation;
  }
  .btn-again:hover  { background: #ff1a2a; transform: translateY(-2px); box-shadow: 0 8px 26px rgba(227,6,19,0.65); }
  .btn-again:active { transform: translateY(0); }

  /* ── Confetti ── */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
  .confetti-piece {
    position: absolute;
    opacity: 0;
    animation: confettiFall linear forwards;
    border-radius: 2px;
    will-change: transform, opacity;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg) scale(1);   opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.4); opacity: 0; }
  }

  /* ── Reduced-motion: kill non-essential animations ── */
  @media (prefers-reduced-motion: reduce) {
    .bg-grid, .bg-orb, .wheel-glow, .spinning-ring.active { animation: none; }
    .confetti-piece { display: none; }
    .result-card, .result-overlay { transition: none; }
  }

  /* ── Landscape phone: shrink wheel so it stays on screen ── */
  @media (max-height: 500px) and (orientation: landscape) {
    .game-wrap { flex-direction: row; gap: 16px; align-items: center; justify-content: center; }
    .wheel-scene { width: min(55vh, 85vw, 340px); height: min(55vh, 85vw, 340px); }
    .header-sub  { display: none; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="game-wrap">
  <div class="header">
    <div class="header-brand"><span>B</span> Mobile</div>
    <div class="header-sub">Spin &amp; Win Lucky Draw</div>
  </div>

  <div class="wheel-scene" id="wheelScene">
    <div class="wheel-glow"></div>
    <div class="pointer"></div>
    <div class="wheel-svg-wrap">
      <canvas id="wheelCanvas"></canvas>
    </div>
    <div class="spinning-ring" id="spinRing"></div>
    <button class="center-btn" id="spinBtn" aria-label="Spin the wheel">
      <span class="logo-b">B</span>
      <span class="logo-mobile">Mobile</span>
      <span class="spin-hint">TAP TO SPIN</span>
    </button>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay" role="dialog" aria-modal="true" aria-live="assertive">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-label">You Won</div>
    <div class="result-prize" id="resultText">Prize Name</div>
    <div class="result-sub"   id="resultSub">Congratulations!</div>
    <button class="btn-again" id="spinAgainBtn">Spin Again</button>
  </div>
</div>

<!-- Confetti -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
'use strict';

// ── Prize data ──
const PRIZES = [
  { label: "Free Data 1GB",   emoji: "📶", sub: "Valid for 7 days. Check SMS for activation.",          color: "#E30613", text: "#fff" },
  { label: "RM5 Reload",      emoji: "💳", sub: "Credit added to your account within 24 hours.",         color: "#b8000e", text: "#fff" },
  { label: "Try Again",       emoji: "🔄", sub: "Better luck next spin!",                                color: "#2a2a3e", text: "#ccc" },
  { label: "Free Call 30min", emoji: "📞", sub: "Valid today only. Calls within network.",               color: "#E30613", text: "#fff" },
  { label: "RM10 Voucher",    emoji: "🎫", sub: "Redeem at any B Mobile store.",                         color: "#900010", text: "#fff" },
  { label: "Try Again",       emoji: "🔄", sub: "Better luck next time!",                                color: "#2a2a3e", text: "#ccc" },
  { label: "Free SMS 100",    emoji: "💬", sub: "100 free SMS, valid for 3 days.",                       color: "#E30613", text: "#fff" },
  { label: "Grand Prize Draw",emoji: "🏆", sub: "You're entered into our monthly grand draw!",           color: "#FFD700", text: "#111" },
];

const N      = PRIZES.length;
const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');
let currentRotation = 0;
let isSpinning      = false;
let resizeTimer     = null;

// ── Canvas sizing ──
// Read the CSS-laid-out size of the scene element, not the canvas CSS attribute.
function resizeCanvas() {
  const scene = document.getElementById('wheelScene');
  const size  = Math.round(scene.getBoundingClientRect().width);
  if (canvas.width === size && canvas.height === size) return; // no change
  canvas.width  = size;
  canvas.height = size;
  drawWheel(currentRotation);
}

// Debounced resize so we don't hammer the canvas on every resize event
function onResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeCanvas, 80);
}

// ── Draw wheel ──
function drawWheel(rotation) {
  const W = canvas.width, H = canvas.height;
  if (W === 0 || H === 0) return;
  const cx = W / 2, cy = H / 2, R = W / 2 - 4;
  const slice = (2 * Math.PI) / N;

  ctx.clearRect(0, 0, W, H);

  // Outer decorative ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R + 2, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(227,6,19,0.55)';
  ctx.lineWidth   = 5;
  ctx.stroke();
  ctx.restore();

  for (let i = 0; i < N; i++) {
    const start = rotation + i * slice;
    const end   = start + slice;
    const prize = PRIZES[i];

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    ctx.fillStyle = prize.color;
    ctx.fill();

    // Slice divider
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // Inner arc accent
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.76, start + 0.03, end - 0.03);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth   = 7;
    ctx.stroke();

    // ── Emoji + label stacked radially, clipped to this slice ──
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);

    // Clip to wedge
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R - 2, -slice / 2, slice / 2);
    ctx.closePath();
    ctx.clip();

    const fontSize = Math.max(9,  W * 0.026);
    const emojSize = Math.max(14, W * 0.044);
    const lineH    = fontSize * 1.45;

    ctx.shadowColor  = 'rgba(0,0,0,0.75)';
    ctx.shadowBlur   = 3;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Split label into up to 2 lines
    const words = prize.label.split(' ');
    const half  = Math.ceil(words.length / 2);
    const lines = words.length > 1
      ? [words.slice(0, half).join(' '), words.slice(half).join(' ')]
      : [words[0]];

    const gap    = fontSize * 0.55;
    const blockH = emojSize + gap + lines.length * lineH;
    const midR   = R * 0.58;
    const topY   = -(blockH / 2);

    // Emoji
    ctx.font = `${emojSize}px serif`;
    ctx.fillText(prize.emoji, midR, topY + emojSize / 2);

    // Label lines
    ctx.font      = `700 ${fontSize}px 'Exo 2', 'Segoe UI', Arial, sans-serif`;
    ctx.fillStyle = prize.text;
    const textStartY = topY + emojSize + gap + lineH / 2;
    lines.forEach((line, li) => {
      ctx.fillText(line, midR, textStartY + li * lineH);
    });

    ctx.restore();
  }

  // Centre shadow (behind the button)
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.14);
  grad.addColorStop(0, 'rgba(0,0,0,0.82)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.18, 0, 2 * Math.PI);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ── Winner calculation ──
// Pointer is at the TOP (−π/2). Slice i starts at rotation + i*slice.
// Slice under pointer: (−rotation − π/2) / slice, floored mod N
function getWinnerFromRotation(rotation) {
  const slice = (2 * Math.PI) / N;
  let angle = ((-rotation - Math.PI / 2) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(angle / slice) % N;
}

// ── Spin ──
function spin() {
  if (isSpinning) return;
  isSpinning = true;

  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  document.getElementById('spinRing').classList.add('active');

  const slice     = (2 * Math.PI) / N;
  const targetIdx = Math.floor(Math.random() * N);

  // Desired final rotation: centre of targetIdx slice under pointer
  const desiredBase = -Math.PI / 2 - targetIdx * slice - slice / 2;
  const extraSpins  = (6 + Math.floor(Math.random() * 4)) * 2 * Math.PI; // 6–9 full turns

  let delta = ((desiredBase - currentRotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (delta < 0.15) delta += 2 * Math.PI;

  const finalRotation = currentRotation + delta + extraSpins;
  const startRot      = currentRotation;
  const duration      = 4000;
  let   startTime     = null;

  // Ease-out cubic
  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function tick(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = Math.min(timestamp - startTime, duration);
    const rot = startRot + (finalRotation - startRot) * easeOut(elapsed / duration);
    drawWheel(rot);

    if (elapsed < duration) {
      requestAnimationFrame(tick);
    } else {
      currentRotation = finalRotation;
      const actualWinner = getWinnerFromRotation(currentRotation);
      onSpinEnd(actualWinner);
    }
  }
  requestAnimationFrame(tick);
}

// ── Show result ──
function onSpinEnd(prizeIdx) {
  isSpinning = false;
  document.getElementById('spinRing').classList.remove('active');

  const p = PRIZES[prizeIdx];
  document.getElementById('resultEmoji').textContent = p.emoji;
  document.getElementById('resultText').textContent  = p.label;
  document.getElementById('resultSub').textContent   = p.sub;

  setTimeout(() => {
    document.getElementById('resultOverlay').classList.add('show');
    if (p.label !== 'Try Again') launchConfetti();
  }, 320);
}

// ── Confetti ──
function launchConfetti() {
  // Skip if user prefers reduced motion
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#E30613','#FFD700','#ffffff','#ff6b6b','#ffd166','#06d6a0'];
  const shapes = ['square','circle','rectangle'];
  const frag   = document.createDocumentFragment();

  for (let i = 0; i < 110; i++) {
    const el    = document.createElement('div');
    el.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const size  = 6 + Math.random() * 10;
    el.style.cssText = [
      `left:${Math.random() * 100}%`,
      `width:${shape === 'rectangle' ? size * 0.5 : size}px`,
      `height:${size}px`,
      `background:${color}`,
      `border-radius:${shape === 'circle' ? '50%' : '2px'}`,
      `animation-duration:${2.4 + Math.random() * 2.2}s`,
      `animation-delay:${Math.random() * 0.9}s`,
    ].join(';');
    frag.appendChild(el);
  }
  container.appendChild(frag);
  setTimeout(() => { container.innerHTML = ''; }, 5500);
}

// ── Close / reset ──
function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  const btn = document.getElementById('spinBtn');
  btn.disabled = false;
}

document.getElementById('spinBtn').addEventListener('click', spin);
// Touch: prevent ghost click delay on mobile
document.getElementById('spinBtn').addEventListener('touchend', (e) => { e.preventDefault(); spin(); }, { passive: false });

document.getElementById('spinAgainBtn').addEventListener('click', closeResult);
document.getElementById('resultOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('resultOverlay')) closeResult();
});

// ── Resize handling ──
window.addEventListener('resize',           onResize, { passive: true });
window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 200); }); // orientation needs a delay

// ── Init ──
// Wait for fonts if available, then draw
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(resizeCanvas);
} else {
  resizeCanvas();
}
</script>
